name: ifmap
description: "infacilityMAP - 屋内ナビゲーションアプリ"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  mobile_scanner: ^4.0.1
  sensors_plus: ^4.0.0
  flutter_compass: ^0.8.1
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    # ── マップJSONファイル ──────────────────────────────────────
    # config.dart の mapSections と完全に対応させること
    # 建物・フロアを追加したらここにも追加する
    - assets/map_1f.json
    - assets/map_2f.json
    # - assets/map_newbldg_1f.json   # 新館を追加するときはコメントを外す
    # - assets/map_newbldg_2f.json